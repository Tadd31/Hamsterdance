<link rel="icon" type="image/svg+xml" href="https://phantom.land/favicon.ico">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f2f2ee;
    --ghost-size: 54px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;

  }


  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 50;
    text-align: center;
    padding: 1.2rem 1rem 1rem;
    background: linear-gradient(to bottom, rgba(10,10,10,1) 70%, rgba(10,10,10,0));
    pointer-events: none;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(0.8rem, 3.8vw, 3.8rem);
    letter-spacing: -0.03em;
    text-transform: uppercase;
    line-height: 1;
    pointer-events: none;
    white-space: nowrap;
  }

  header h1 em {
    font-style: normal;
    opacity: 0.2;
    cursor: pointer;
    pointer-events: all;
    display: inline-block;
    animation: star-glow 2.5s ease-in-out infinite alternate;
    transition: opacity 0.3s;
  }

  header h1 em:hover { opacity: 0.5; }

  @keyframes star-glow {
    from { text-shadow: 0 0 4px rgba(242,242,238,0.1), 0 0 8px rgba(242,242,238,0.05); opacity: 0.10; }
    to   { text-shadow: 0 0 12px rgba(242,242,238,0.5), 0 0 24px rgba(242,242,238,0.2); opacity: 0.69; }
  }

  /* push dance stage down so it starts below fixed header */
  /* DANCE FLOOR */
  .dance-stage {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    width: 100%;
    padding-top: 5rem;
    padding-bottom: 5rem;
  }


  /* DANCE FLOOR — ghosts wrap naturally to fill screen width */
  .dance-stage {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    padding: 5rem 0 5rem;
    width: 100%;
  }

  .ghost-img {
    width: var(--ghost-size);
    height: var(--ghost-size);
    object-fit: contain;
    filter: invert(1);
    transform-origin: bottom center;
    display: block;
    cursor: default;
    flex-shrink: 0;
    flex-grow: 0;
  }



  .ghost-img {
    object-fit: contain;
    filter: invert(1);
    transform-origin: bottom center;
    display: block;
    cursor: default;
  }




  /* b1 — clean bounce, grounded on X axis */
  @keyframes b1 {
    from { transform: translateY(0)     scaleX(1)    scaleY(1)    rotate(-3deg); }
    to   { transform: translateY(-16px) scaleX(0.93) scaleY(1.08) rotate(3deg);  }
  }
  /* turn — flips direction mid bounce, grounded */
  @keyframes turn {
    0%   { transform: translateY(0)     scaleX(1)     scaleY(1)    rotate(-3deg); }
    45%  { transform: translateY(-16px) scaleX(0.93)  scaleY(1.08) rotate(3deg);  }
    50%  { transform: translateY(-14px) scaleX(0)     scaleY(1.08) rotate(0deg);  }
    55%  { transform: translateY(-16px) scaleX(-0.93) scaleY(1.08) rotate(-3deg); }
    100% { transform: translateY(0)     scaleX(-1)    scaleY(1)    rotate(3deg);  }
  }
  /* stretch — film-strip squish and stretch */
  @keyframes stretch {
    0%   { transform: scaleX(1)    scaleY(1);    }
    25%  { transform: scaleX(1.15) scaleY(0.75); }
    50%  { transform: scaleX(0.85) scaleY(1.3);  }
    75%  { transform: scaleX(1.05) scaleY(0.9);  }
    100% { transform: scaleX(1)    scaleY(1);    }
  }

  /* shrink — pulse in and out like a heartbeat */
  @keyframes shrink {
    0%   { transform: scale(1);    }
    40%  { transform: scale(0.55); }
    60%  { transform: scale(0.55); }
    100% { transform: scale(1);    }
  }

  /* wave — sways left and right */
  @keyframes wave {
    0%   { transform: translateX(0)    rotate(0deg);   }
    25%  { transform: translateX(-8px) rotate(-8deg);  }
    75%  { transform: translateX(8px)  rotate(8deg);   }
    100% { transform: translateX(0)    rotate(0deg);   }
  }

  /* wobble — pendulum rotation */
  @keyframes wobble {
    0%   { transform: rotate(0deg);   }
    20%  { transform: rotate(-18deg); }
    60%  { transform: rotate(18deg);  }
    100% { transform: rotate(0deg);   }
  }

  /* float — gentle hover up and down */
  @keyframes float {
    from { transform: translateY(0);    }
    to   { transform: translateY(-12px);}
  }

  /* squash — hits ground and pops back */
  @keyframes squash {
    0%   { transform: translateY(0)     scaleX(1)    scaleY(1);    }
    60%  { transform: translateY(0)     scaleX(1.4)  scaleY(0.5);  }
    75%  { transform: translateY(-18px) scaleX(0.88) scaleY(1.15); }
    90%  { transform: translateY(0)     scaleX(1.1)  scaleY(0.9);  }
    100% { transform: translateY(0)     scaleX(1)    scaleY(1);    }
  }

  @keyframes shake {
    0%   { transform: translateX(0);    }
    15%  { transform: translateX(-6px); }
    30%  { transform: translateX(6px);  }
    45%  { transform: translateX(-5px); }
    60%  { transform: translateX(5px);  }
    75%  { transform: translateX(-3px); }
    90%  { transform: translateX(3px);  }
    100% { transform: translateX(0);    }
  }

  @keyframes nod {
    0%   { transform: translateY(0)    scaleX(1)    scaleY(1);    }
    30%  { transform: translateY(6px)  scaleX(1.08) scaleY(0.88); }
    60%  { transform: translateY(-8px) scaleX(0.94) scaleY(1.1);  }
    80%  { transform: translateY(3px)  scaleX(1.04) scaleY(0.96); }
    100% { transform: translateY(0)    scaleX(1)    scaleY(1);    }
  }

  @keyframes heartbeat {
    0%   { transform: scale(1);    }
    14%  { transform: scale(1.25); }
    28%  { transform: scale(1);    }
    42%  { transform: scale(1.2);  }
    56%  { transform: scale(1);    }
    100% { transform: scale(1);    }
  }

  @keyframes melt {
    0%   { transform: scaleX(1)   scaleY(1)    translateY(0);    }
    40%  { transform: scaleX(1.6) scaleY(0.35) translateY(12px); }
    55%  { transform: scaleX(1.6) scaleY(0.35) translateY(12px); }
    80%  { transform: scaleX(0.9) scaleY(1.15) translateY(-6px); }
    100% { transform: scaleX(1)   scaleY(1)    translateY(0);    }
  }

  .music-bar {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 100;
  }

  #music-btn {
    background: var(--white);
    color: var(--black);
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.55rem 1rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #music-btn:hover { opacity: 0.75; }

  /* Speed control bar */
  .speed-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
    padding: 0.6rem 0;
    background: rgba(10,10,10,0.92);
    border-top: 1px solid rgba(242,242,238,0.08);
  }

  .speed-btn {
    flex: 1;
    max-width: 80px;
    padding: 0.5rem 0;
    background: none;
    border: none;
    color: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.35;
    cursor: pointer;
    transition: opacity 0.2s;
    text-align: center;
  }
  .speed-btn:hover  { opacity: 0.7; }
  .speed-btn.active { opacity: 1; border-bottom: 2px solid var(--white); }

  #reg {
    cursor: pointer;
    display: inline-block;
  }

  .boo-pop {
    position: fixed;
    left: 50%;
    bottom: 4rem;
    transform: translateX(-50%);
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    color: var(--white);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 999;
    white-space: nowrap;
  }
  .boo-pop.show { opacity: 1; }

  footer {
    text-align: center;
    padding: 1.5rem 1rem 3rem;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.18;
  }

  /* Ghost counter */
  #ghost-count {
    position: fixed;
    bottom: 4rem;
    left: 1.2rem;
    z-index: 100;
    font-family: 'Space Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--white);
    opacity: 0.25;
    pointer-events: none;
    line-height: 1.4;
  }

  /* ── INTRO SCREEN ── */
  #intro {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: var(--black);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.8s ease;
  }

  #intro.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  /* Ghost: correct proportions — PNG is portrait so use auto height */
  #intro-ghost {
    width: 160px;
    height: auto;
    filter: invert(1);
    transform-origin: center center;
    display: block;
    /* wobble via animation, zoom via JS adding keyframe class */
    animation: intro-wobble 3s ease-in-out infinite;
  }

  /* Zoom is handled by a separate keyframe so it overrides wobble cleanly */
  #intro-ghost.zoom {
    animation: intro-zoom 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes intro-wobble {
    0%   { transform: rotate(-2deg) scale(1);    }
    25%  { transform: rotate(2deg)  scale(1.02); }
    50%  { transform: rotate(-1deg) scale(0.99); }
    75%  { transform: rotate(2deg)  scale(1.01); }
    100% { transform: rotate(-2deg) scale(1);    }
  }

  @keyframes intro-zoom {
    0%   { transform: scale(1);   opacity: 1; }
    60%  { transform: scale(30);  opacity: 1; }
    100% { transform: scale(40);  opacity: 0; }
  }

  /* hint text */
  #intro-hint {
    position: absolute;
    bottom: 12%;
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--white);
    opacity: 0;
    pointer-events: none;
    animation: hint-fade 1.2s ease 6s forwards;
  }

  @keyframes hint-fade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 0.3; transform: translateY(0); }
  }

  /* main hidden until intro done */
  #main {
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  #main.visible { opacity: 1; }

  /* ── DISCO BALL ── */
  #disco-wrap {
    position: fixed;
    top: 0;
    left: 50%;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    transform: translateX(-50%) translateY(-110%);
    transition: transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
  }

  #disco-wrap.dropped {
    transform: translateX(-50%) translateY(0);
  }

  #disco-svg {
    width: 140px;
    height: auto;
    display: block;
  }

  /* Coloured floor light spots */
  .disco-spot {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    mix-blend-mode: screen;
    z-index: 10;
    filter: blur(6px);
    transition: opacity 0.4s ease;
  }

  body.disco-active .disco-spot {
    animation: spot-dance 2s ease-in-out infinite;
  }

  @keyframes spot-dance {
    0%   { opacity: 0;   transform: scale(0.5) translate(0px, 0px);   }
    25%  { opacity: 0.6; transform: scale(1.2) translate(10px, -5px); }
    50%  { opacity: 0.8; transform: scale(0.9) translate(-8px, 8px);  }
    75%  { opacity: 0.5; transform: scale(1.1) translate(6px, -3px);  }
    100% { opacity: 0;   transform: scale(0.5) translate(0px, 0px);   }
  }

  /* ── DESKTOP LAYOUT ── */
  @media (min-width: 768px) {
    :root { --ghost-size: 72px; }



    .speed-bar {
      left: 50%;
      transform: translateX(-50%);
      width: auto;
      gap: 0.5rem;
      padding: 0.8rem 2rem;
      border-radius: 2rem;
      bottom: 1.5rem;
    }

    .speed-btn {
      max-width: 60px;
    }

    #intro-ghost {
      width: 220px;
    }
  }
</style>
</head>

  const SPEED       = 0.48;
  const STRETCH_DUR = 1.2;
  const TURN_DUR    = 1.6;

  // Colour palette: filter values that change fill but keep outline
  // invert(1) turns black→white, then sepia+hue-rotate tints the fill
  const colours = [
    'invert(1)',                                                           // white
    'invert(1) sepia(1) saturate(4) hue-rotate(200deg)',                  // blue
    'invert(1) sepia(1) saturate(4) hue-rotate(90deg)',                   // green
    'invert(1) sepia(1) saturate(6) hue-rotate(300deg)',                  // purple
    'invert(1) sepia(1) saturate(8) hue-rotate(0deg)',                    // red
    'invert(1) sepia(1) saturate(6) hue-rotate(160deg)',                  // teal
    'invert(1) sepia(1) saturate(5) hue-rotate(240deg)',                  // indigo
    'invert(1) sepia(1) saturate(8) hue-rotate(40deg)',                   // orange
    'invert(1) sepia(1) saturate(6) hue-rotate(320deg)',                  // pink
    'invert(1) sepia(1) saturate(5) hue-rotate(180deg)',                  // cyan
    'invert(1) sepia(1) saturate(7) hue-rotate(60deg)',                   // yellow-green
    'invert(1) sepia(1) saturate(6) hue-rotate(270deg)',                  // violet
    'invert(1) sepia(1) saturate(9) hue-rotate(15deg)',                   // amber
    'invert(1) sepia(1) saturate(5) hue-rotate(140deg)',                  // lime
    'invert(1)',                                                           // white again
    'invert(1) sepia(1) saturate(4) hue-rotate(220deg)',                  // sky blue
    'invert(1) sepia(1) saturate(7) hue-rotate(330deg)',                  // hot pink
    'invert(1) sepia(1) saturate(6) hue-rotate(75deg)',                   // chartreuse
    'invert(1) sepia(1) saturate(8) hue-rotate(190deg)',                  // electric blue
    'invert(1) sepia(1) saturate(7) hue-rotate(355deg)',                  // crimson
  ];

  const stage = document.getElementById('stage');

  // ── State vars — all declared before any function that uses them ──
  let rowIdx     = 0;
  let chaosMode  = false;
  let speedMult  = 1.0;
  let ghostTotal = 0;

  const animTypes = ['bounce','stretch','turn','shrink','wave','wobble','float','squash','shake','nod','heartbeat','melt'];
  const DURS = {bounce:0.48,stretch:1.2,turn:1.6,shrink:0.9,wave:1.0,wobble:0.8,float:1.4,squash:1.1,shake:0.5,nod:0.9,heartbeat:0.8,melt:1.4};
  const GHOST_PX = 54; // matches --ghost-size

  function makeAnim(animType, dur, frameOffset) {
    const s = dur / speedMult, o = frameOffset / speedMult;
    switch(animType) {
      case 'bounce':    return `b1 ${s}s ease-in-out ${o}s infinite alternate`;
      case 'float':     return `float ${s}s ease-in-out ${o}s infinite alternate`;
      default:          return `${animType} ${s}s ease-in-out ${o}s infinite`;
    }
  }

  // ── BLOCK DATA STORE ──
  // blocks[] = source of truth. Grows forever, never shrinks.
  //
  // KEY DESIGN (lessons learned):
  // - Stage stays display:flex;flex-wrap:wrap — ghosts flow naturally, NO row breaks
  // - Each block owns N ghost <img> elements appended directly to stage
  // - Each block also owns one zero-height sentinel <div> appended after its ghosts
  //   This sentinel is a real div so getBoundingClientRect() works reliably
  // - When a block is offscreen: imgs removed, sentinel gets a height placeholder
  //   so the page height stays constant → scroll-up works perfectly
  // - When block comes back into view: imgs re-injected before sentinel, height cleared
  // - Counter increments once per block in addBlock(), never on re-inject
  const blocks = [];
  let dataRowIdx = 0;

  function buildGhostData(count, rowAnim, rowClr) {
    const ghosts = [];
    for (let i = 0; i < count; i++) {
      const a = chaosMode ? animTypes[Math.floor(Math.random()*animTypes.length)] : rowAnim;
      const c = chaosMode ? colours[Math.floor(Math.random()*colours.length)]    : rowClr;
      const d = DURS[a];
      const f = chaosMode ? -(Math.random()*d) : -(i*(d/count));
      ghosts.push({animType:a, colour:c, dur:d, frameOffset:f});
    }
    return ghosts;
  }

  // Estimate collapsed height of a block in pixels
  function estimateHeight(block) {
    const perRow = Math.max(Math.floor(stage.offsetWidth / GHOST_PX), 1);
    return Math.ceil(block.ghosts.length / perRow) * GHOST_PX;
  }

  // Inject ghost imgs into stage before the block's sentinel
  function injectImgs(block) {
    if (block.live) return;
    // Remove placeholder if present
    if (block.placeholder.parentNode) block.placeholder.remove();
    block.ghosts.forEach(({animType, colour, dur, frameOffset}) => {
      const img = document.createElement('img');
      img.src         = GHOST;
      img.className   = 'ghost-img';
      img.alt         = '';
      img.style.filter    = colour;
      img.style.animation = makeAnim(animType, dur, frameOffset);
      img.dataset.baseDur = img.style.animationDuration;
      // Insert before sentinel so order is preserved
      stage.insertBefore(img, block.sentinel);
    });
    block.live = true;
  }

  // Remove ghost imgs — insert a same-height placeholder to preserve scroll height
  function removeImgs(block) {
    if (!block.live) return;
    const h = estimateHeight(block);
    block.imgs.forEach(img => img.remove());
    block.imgs = [];
    // Placeholder holds the space — full width forces its own row
    block.placeholder.style.cssText = `width:100%;height:${h}px;flex-shrink:0;`;
    stage.insertBefore(block.placeholder, block.sentinel);
    block.live = false;
  }

  // After injecting, collect img refs for future removal
  function collectImgs(block) {
    block.imgs = [];
    let node = block.sentinel.previousSibling;
    let count = block.ghosts.length;
    while (node && count > 0) {
      if (node.classList && node.classList.contains('ghost-img')) {
        block.imgs.unshift(node);
        count--;
      }
      node = node.previousSibling;
    }
  }

  // Create one new block — data + sentinel in DOM + ghost imgs injected
  function addBlock() {
    const count    = Math.floor(Math.random() * 5) + 10;
    const rowAnim  = animTypes[dataRowIdx % animTypes.length];
    const rowClr   = colours[dataRowIdx % colours.length];
    const ghosts   = buildGhostData(count, rowAnim, rowClr);
    dataRowIdx++;

    // Sentinel: truly zero-size so it has zero impact on flex layout
    // getBoundingClientRect still works on zero-size elements
    const sentinel = document.createElement('div');
    sentinel.style.cssText = 'width:0;height:0;padding:0;margin:0;border:0;flex:0 0 0;overflow:hidden;';
    stage.insertBefore(sentinel, scrollSentinel);

    // Placeholder: only in DOM when block is collapsed
    const placeholder = document.createElement('div');
    placeholder.style.cssText = 'display:none;';

    const block = { ghosts, sentinel, placeholder, imgs: [], live: false };
    blocks.push(block);

    injectImgs(block);
    collectImgs(block);

    // Counter: once only, here, never on re-inject
    ghostTotal += count;
    const el = document.getElementById('count-num');
    if (el) el.textContent = ghostTotal.toLocaleString();
  }

  // ── INFINITE SCROLL ──
  const scrollSentinel = document.createElement('div');
  scrollSentinel.style.cssText = 'width:0;height:0;padding:0;margin:0;flex:0 0 0;';
  stage.appendChild(scrollSentinel);

  function addBlocks(n) {
    for (let i = 0; i < n; i++) addBlock();
  }

  const ioInfinite = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) addBlocks(15);
  }, { rootMargin: '600px' });
  ioInfinite.observe(scrollSentinel);

  // ── VIEWPORT RECYCLING ──
  const BUFFER = window.innerHeight * 2.5;

  function manageViewport() {
    blocks.forEach(block => {
      const rect   = block.sentinel.getBoundingClientRect();
      // Sentinel is at the END of the block, so block content is above it
      const blockBottom = rect.top;
      const blockTop    = rect.top - estimateHeight(block);
      const inView = blockBottom > -BUFFER && blockTop < window.innerHeight + BUFFER;
      if (inView && !block.live) {
        injectImgs(block);
        collectImgs(block);
      } else if (!inView && block.live) {
        removeImgs(block);
      }
    });
  }

  let rafPending = false;
  window.addEventListener('scroll', () => {
    if (rafPending) return;
    rafPending = true;
    requestAnimationFrame(() => { rafPending = false; manageViewport(); });
  }, { passive: true });

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) manageViewport();
  });

  let compressor = null; // DynamicsCompressorNode — prevents clipping/crackling

  function createAudioCtx() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Compressor sits between all oscillators and the destination.
    // Prevents multiple simultaneous notes from clipping the output.
    // To revert: remove this block and change gain.connect(compressor)
    // back to gain.connect(ctx.destination)
    compressor = ctx.createDynamicsCompressor();
    compressor.threshold.value = -18;  // start compressing at -18dB
    compressor.knee.value       = 6;   // soft knee for natural sound
    compressor.ratio.value      = 4;   // 4:1 compression ratio
    compressor.attack.value     = 0.003; // 3ms attack
    compressor.release.value    = 0.15;  // 150ms release
    compressor.connect(ctx.destination);
    return ctx;
  }

  function scheduleNotes() {
    if (!playing || !audioCtx) return;
    const sp  = speedMult;
    // Use currentTime + tiny buffer so first note fires immediately
    const now = audioCtx.currentTime + 0.05;

    sourceNodes.forEach(n => { try { n.stop(); } catch(e) {} });
    sourceNodes = [];

    // Notes already start at t=0 (2s silence stripped from MIDI_NOTES)
    MIDI_NOTES.forEach(([t, freq, dur]) => {
      const st = now + (t / sp);          // no leading silence at any speed
      const sd = Math.max(dur / sp, 0.03);
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.stop(st + sd + 0.05);

    discoWrap.classList.add('dropped');
    document.body.classList.add('disco-active');
    discoSpots.querySelectorAll('.disco-spot').forEach(s => s.style.opacity = '');
  }

  function liftDiscoBall() {
    discoDown = false;
    discoWrap.classList.remove('dropped');
    document.body.classList.remove('disco-active');
    // Force spots invisible immediately — animation won't leave any stuck
    discoSpots.querySelectorAll('.disco-spot').forEach(s => s.style.opacity = '0');
  }

  star.addEventListener('click', (e) => {
    requestAnimationFrame(() => {
      if (chaosMode) dropDiscoBall(); else liftDiscoBall();
    });
  });
</script>
</body>
</html>
