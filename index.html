<title>The Phantom Dance</title>

<link rel="icon" type="image/svg+xml" href="https://phantom.land/favicon.ico">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f2f2ee;
    --ghost-size: 54px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;

  }


  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 50;
    text-align: center;
    padding: 1.2rem 1rem 1rem;
    background: linear-gradient(to bottom, rgba(10,10,10,1) 70%, rgba(10,10,10,0));
    pointer-events: none;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(0.8rem, 3.8vw, 3.8rem);
    letter-spacing: -0.03em;
    text-transform: uppercase;
    line-height: 1;
    pointer-events: none;
    white-space: nowrap;
  }

  header h1 em {
    font-style: normal;
    opacity: 0.2;
    cursor: pointer;
    pointer-events: all;
    display: inline-block;
    animation: star-glow 2.5s ease-in-out infinite alternate;
    transition: opacity 0.3s;
  }

  header h1 em:hover { opacity: 0.5; }

  @keyframes star-glow {
    from { text-shadow: 0 0 4px rgba(242,242,238,0.1), 0 0 8px rgba(242,242,238,0.05); opacity: 0.10; }
    to   { text-shadow: 0 0 12px rgba(242,242,238,0.5), 0 0 24px rgba(242,242,238,0.2); opacity: 0.69; }
  }

  /* push dance stage down so it starts below fixed header */
  .dance-stage {
    padding-top: 5rem;
  }


  /* DANCE FLOOR — ghosts wrap naturally to fill screen width */
  .dance-stage {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    padding: 5rem 0 5rem;
    width: 100%;
  }

  .ghost-img {
    width: var(--ghost-size);
    height: var(--ghost-size);
    object-fit: contain;
    filter: invert(1);
    transform-origin: bottom center;
    display: block;
    cursor: default;
    flex-shrink: 0;
    flex-grow: 0;
  }



  .ghost-img {
    object-fit: contain;
    filter: invert(1);
    transform-origin: bottom center;
    display: block;
    cursor: default;
  }




  /* b1 — clean bounce, grounded on X axis */
  @keyframes b1 {
    from { transform: translateY(0)     scaleX(1)    scaleY(1)    rotate(-3deg); }
    to   { transform: translateY(-16px) scaleX(0.93) scaleY(1.08) rotate(3deg);  }
  }
  /* turn — flips direction mid bounce, grounded */
  @keyframes turn {
    0%   { transform: translateY(0)     scaleX(1)     scaleY(1)    rotate(-3deg); }
    45%  { transform: translateY(-16px) scaleX(0.93)  scaleY(1.08) rotate(3deg);  }
    50%  { transform: translateY(-14px) scaleX(0)     scaleY(1.08) rotate(0deg);  }
    55%  { transform: translateY(-16px) scaleX(-0.93) scaleY(1.08) rotate(-3deg); }
    100% { transform: translateY(0)     scaleX(-1)    scaleY(1)    rotate(3deg);  }
  }
  /* stretch — film-strip squish and stretch */
  @keyframes stretch {
    0%   { transform: scaleX(1)    scaleY(1);    }
    25%  { transform: scaleX(1.15) scaleY(0.75); }
    50%  { transform: scaleX(0.85) scaleY(1.3);  }
    75%  { transform: scaleX(1.05) scaleY(0.9);  }
    100% { transform: scaleX(1)    scaleY(1);    }
  }

  /* shrink — pulse in and out like a heartbeat */
  @keyframes shrink {
    0%   { transform: scale(1);    }
    40%  { transform: scale(0.55); }
    60%  { transform: scale(0.55); }
    100% { transform: scale(1);    }
  }

  /* wave — sways left and right */
  @keyframes wave {
    0%   { transform: translateX(0)    rotate(0deg);   }
    25%  { transform: translateX(-8px) rotate(-8deg);  }
    75%  { transform: translateX(8px)  rotate(8deg);   }
    100% { transform: translateX(0)    rotate(0deg);   }
  }

  /* wobble — pendulum rotation */
  @keyframes wobble {
    0%   { transform: rotate(0deg);   }
    20%  { transform: rotate(-18deg); }
    60%  { transform: rotate(18deg);  }
    100% { transform: rotate(0deg);   }
  }

  /* float — gentle hover up and down */
  @keyframes float {
    from { transform: translateY(0);    }
    to   { transform: translateY(-12px);}
  }

  /* squash — hits ground and pops back */
  @keyframes squash {
    0%   { transform: translateY(0)     scaleX(1)    scaleY(1);    }
    60%  { transform: translateY(0)     scaleX(1.4)  scaleY(0.5);  }
    75%  { transform: translateY(-18px) scaleX(0.88) scaleY(1.15); }
    90%  { transform: translateY(0)     scaleX(1.1)  scaleY(0.9);  }
    100% { transform: translateY(0)     scaleX(1)    scaleY(1);    }
  }

  @keyframes shake {
    0%   { transform: translateX(0);    }
    15%  { transform: translateX(-6px); }
    30%  { transform: translateX(6px);  }
    45%  { transform: translateX(-5px); }
    60%  { transform: translateX(5px);  }
    75%  { transform: translateX(-3px); }
    90%  { transform: translateX(3px);  }
    100% { transform: translateX(0);    }
  }

  @keyframes nod {
    0%   { transform: translateY(0)    scaleX(1)    scaleY(1);    }
    30%  { transform: translateY(6px)  scaleX(1.08) scaleY(0.88); }
    60%  { transform: translateY(-8px) scaleX(0.94) scaleY(1.1);  }
    80%  { transform: translateY(3px)  scaleX(1.04) scaleY(0.96); }
    100% { transform: translateY(0)    scaleX(1)    scaleY(1);    }
  }

  @keyframes heartbeat {
    0%   { transform: scale(1);    }
    14%  { transform: scale(1.25); }
    28%  { transform: scale(1);    }
    42%  { transform: scale(1.2);  }
    56%  { transform: scale(1);    }
    100% { transform: scale(1);    }
  }

  @keyframes melt {
    0%   { transform: scaleX(1)   scaleY(1)    translateY(0);    }
    40%  { transform: scaleX(1.6) scaleY(0.35) translateY(12px); }
    55%  { transform: scaleX(1.6) scaleY(0.35) translateY(12px); }
    80%  { transform: scaleX(0.9) scaleY(1.15) translateY(-6px); }
    100% { transform: scaleX(1)   scaleY(1)    translateY(0);    }
  }

  .music-bar {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 100;
  }

  #music-btn {
    background: var(--white);
    color: var(--black);
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.55rem 1rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #music-btn:hover { opacity: 0.75; }

  /* Speed control bar */
  .speed-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
    padding: 0.6rem 0;
    background: rgba(10,10,10,0.92);
    border-top: 1px solid rgba(242,242,238,0.08);
  }

  .speed-btn {
    flex: 1;
    max-width: 80px;
    padding: 0.5rem 0;
    background: none;
    border: none;
    color: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.35;
    cursor: pointer;
    transition: opacity 0.2s;
    text-align: center;
  }
  .speed-btn:hover  { opacity: 0.7; }
  .speed-btn.active { opacity: 1; border-bottom: 2px solid var(--white); }

  #reg {
    cursor: pointer;
    display: inline-block;
  }

  .boo-pop {
    position: fixed;
    left: 50%;
    bottom: 4rem;
    transform: translateX(-50%);
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    color: var(--white);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 999;
    white-space: nowrap;
  }
  .boo-pop.show { opacity: 1; }

  footer {
    text-align: center;
    padding: 1.5rem 1rem 3rem;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.18;
  }

  /* Ghost counter */
  #ghost-count {
    position: fixed;
    bottom: 4rem;
    left: 1.2rem;
    z-index: 100;
    font-family: 'Space Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--white);
    opacity: 0.25;
    pointer-events: none;
    line-height: 1.4;
  }

  /* ── INTRO SCREEN ── */
  #intro {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: var(--black);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.8s ease;
  }

  #intro.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  /* Ghost: correct proportions — PNG is portrait so use auto height */
  #intro-ghost {
    width: 160px;
    height: auto;
    filter: invert(1);
    transform-origin: center center;
    display: block;
    /* wobble via animation, zoom via JS adding keyframe class */
    animation: intro-wobble 3s ease-in-out infinite;
  }

  /* Zoom is handled by a separate keyframe so it overrides wobble cleanly */
  #intro-ghost.zoom {
    animation: intro-zoom 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes intro-wobble {
    0%   { transform: rotate(-2deg) scale(1);    }
    25%  { transform: rotate(2deg)  scale(1.02); }
    50%  { transform: rotate(-1deg) scale(0.99); }
    75%  { transform: rotate(2deg)  scale(1.01); }
    100% { transform: rotate(-2deg) scale(1);    }
  }

  @keyframes intro-zoom {
    0%   { transform: scale(1);   opacity: 1; }
    60%  { transform: scale(30);  opacity: 1; }
    100% { transform: scale(40);  opacity: 0; }
  }

  /* hint text */
  #intro-hint {
    position: absolute;
    bottom: 12%;
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--white);
    opacity: 0;
    pointer-events: none;
    animation: hint-fade 1.2s ease 6s forwards;
  }

  @keyframes hint-fade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 0.3; transform: translateY(0); }
  }

  /* main hidden until intro done */
  #main {
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  #main.visible { opacity: 1; }

  /* ── DESKTOP LAYOUT ── */
  @media (min-width: 768px) {
    :root { --ghost-size: 72px; }



    .speed-bar {
      left: 50%;
      transform: translateX(-50%);
      width: auto;
      gap: 0.5rem;
      padding: 0.8rem 2rem;
      border-radius: 2rem;
      bottom: 1.5rem;
    }

    .speed-btn {
      max-width: 60px;
    }

    #intro-ghost {
      width: 220px;
    }
  }
</style>
</head>

  const SPEED       = 0.48;
  const STRETCH_DUR = 1.2;
  const TURN_DUR    = 1.6;

  // Colour palette: filter values that change fill but keep outline
  // invert(1) turns black→white, then sepia+hue-rotate tints the fill
  const colours = [
    'invert(1)',                                                           // white
    'invert(1) sepia(1) saturate(4) hue-rotate(200deg)',                  // blue
    'invert(1) sepia(1) saturate(4) hue-rotate(90deg)',                   // green
    'invert(1) sepia(1) saturate(6) hue-rotate(300deg)',                  // purple
    'invert(1) sepia(1) saturate(8) hue-rotate(0deg)',                    // red
    'invert(1) sepia(1) saturate(6) hue-rotate(160deg)',                  // teal
    'invert(1) sepia(1) saturate(5) hue-rotate(240deg)',                  // indigo
    'invert(1) sepia(1) saturate(8) hue-rotate(40deg)',                   // orange
    'invert(1) sepia(1) saturate(6) hue-rotate(320deg)',                  // pink
    'invert(1) sepia(1) saturate(5) hue-rotate(180deg)',                  // cyan
    'invert(1) sepia(1) saturate(7) hue-rotate(60deg)',                   // yellow-green
    'invert(1) sepia(1) saturate(6) hue-rotate(270deg)',                  // violet
    'invert(1) sepia(1) saturate(9) hue-rotate(15deg)',                   // amber
    'invert(1) sepia(1) saturate(5) hue-rotate(140deg)',                  // lime
    'invert(1)',                                                           // white again
    'invert(1) sepia(1) saturate(4) hue-rotate(220deg)',                  // sky blue
    'invert(1) sepia(1) saturate(7) hue-rotate(330deg)',                  // hot pink
    'invert(1) sepia(1) saturate(6) hue-rotate(75deg)',                   // chartreuse
    'invert(1) sepia(1) saturate(8) hue-rotate(190deg)',                  // electric blue
    'invert(1) sepia(1) saturate(7) hue-rotate(355deg)',                  // crimson
  ];

  const stage = document.getElementById('stage');
  let rowIdx     = 0;
  let chaosMode  = false; // must be before addGhostBlock
  let speedMult  = 1.0;   // must be before addGhostBlock
  let ghostTotal = 0;     // must be before addGhostBlock

  // 6 animation personalities cycling
  const animTypes = ['bounce', 'stretch', 'turn', 'shrink', 'wave', 'wobble', 'float', 'squash', 'shake', 'nod', 'heartbeat', 'melt'];

  function addGhostBlock() {
    const count        = Math.floor(Math.random() * 5) + 10; // 10-14 per block
    const rowAnimType  = animTypes[rowIdx % animTypes.length];
    const rowColour    = colours[rowIdx % colours.length];

    for (let i = 0; i < count; i++) {
      const img = document.createElement('img');
      img.src = GHOST;
      img.className = 'ghost-img';
      img.alt = '';

      // Respect chaos mode: each ghost random, otherwise follow row sequence
      const animType = chaosMode
        ? animTypes[Math.floor(Math.random() * animTypes.length)]
        : rowAnimType;
      const colour = chaosMode
        ? colours[Math.floor(Math.random() * colours.length)]
        : rowColour;

      img.style.filter = colour;

      const dur = { bounce:0.48, stretch:1.2, turn:1.6, shrink:0.9, wave:1.0, wobble:0.8, float:1.4, squash:1.1, shake:0.5, nod:0.9, heartbeat:0.8, melt:1.4 }[animType];
      const frameOffset = chaosMode
        ? -(Math.random() * dur)     // random phase in chaos mode
        : -(i * (dur / count));      // film-strip frames in row mode

      const sp = speedMult;
      const sdur = dur / sp;
      const soff = frameOffset / sp;
      switch(animType) {
        case 'bounce':
          img.style.animation = `b1 ${sdur}s ease-in-out ${soff}s infinite alternate`;
          break;
        case 'stretch':
          img.style.animation = `stretch ${sdur}s ease-in-out ${soff}s infinite`;
          break;
        case 'turn':
          img.style.animation = `turn ${sdur}s ease-in-out ${soff}s infinite`;
          break;
        case 'shrink':
          img.style.animation = `shrink ${sdur}s ease-in-out ${soff}s infinite`;
          break;
        case 'wave':
          img.style.animation = `wave ${sdur}s ease-in-out ${soff}s infinite`;
          break;
        case 'wobble':
          img.style.animation = `wobble ${sdur}s ease-in-out ${soff}s infinite`;
          break;
        case 'float':
          img.style.animation = `float ${sdur}s ease-in-out ${soff}s infinite alternate`;
          break;
        case 'squash':
          img.style.animation = `squash ${sdur}s ease-in-out ${soff}s infinite`;
          break;
        case 'shake':
          img.style.animation = `shake ${sdur}s ease-in-out ${soff}s infinite`;
          break;
        case 'nod':
          img.style.animation = `nod ${sdur}s ease-in-out ${soff}s infinite`;
          break;
        case 'heartbeat':
          img.style.animation = `heartbeat ${sdur}s ease-in-out ${soff}s infinite`;
          break;
        case 'melt':
          img.style.animation = `melt ${sdur}s ease-in-out ${soff}s infinite`;
          break;
      }

      // Store base animation durations for speed control
      img.dataset.baseDur = img.style.animationDuration;

      stage.appendChild(img);
    }
    if (typeof updateCount === 'function') updateCount(count);
    rowIdx++;
  }

  // Initial fill
  for (let r = 0; r < 30; r++) addGhostBlock();

  // Infinite scroll — poll every 300ms, add more when near bottom
  setInterval(function() {
    const fromBottom = document.documentElement.scrollHeight - window.scrollY - window.innerHeight;
    if (fromBottom < 800) {
      for (let r = 0; r < 20; r++) addGhostBlock();
    }

const MIDI_DUR=52.25;

  let playing     = false;
  let audioCtx    = null;
  let sourceNodes = [];
  let loopTimeout = null;

  // ── Preload: create AudioContext early (suspended) so it's ready instantly ──
  // Browsers require a user gesture to resume — we do that on first interaction.
  // This eliminates the tiny initialisation delay when music starts.
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Keep it suspended until the user interacts — no sound yet
  } catch(e) {}

  function scheduleNotes() {
    if (!playing || !audioCtx) return;
    const sp  = speedMult;
    // Use currentTime + tiny buffer so first note fires immediately
    const now = audioCtx.currentTime + 0.05;

    sourceNodes.forEach(n => { try { n.stop(); } catch(e) {} });
    sourceNodes = [];

    // Notes already start at t=0 (2s silence stripped from MIDI_NOTES)
    MIDI_NOTES.forEach(([t, freq, dur]) => {
      const st = now + (t / sp);          // no leading silence at any speed
      const sd = Math.max(dur / sp, 0.03);
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'triangle';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, st);
      gain.gain.linearRampToValueAtTime(0.06, st + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, st + sd);
      osc.start(st);
      osc.stop(st + sd + 0.05);
      sourceNodes.push(osc);
    });

    loopTimeout = setTimeout(scheduleNotes, (MIDI_DUR / sp) * 1000);
  }

  function startMusic() {
    if (playing) return;
    playing = true;
    document.getElementById('music-btn').textContent = '■ Stop';
    // Resume the preloaded context (or create fresh if it was never made)
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    audioCtx.resume().then(() => scheduleNotes());
  }

  function stopMusic() {
    playing = false;
    document.getElementById('music-btn').textContent = '♪ Play';
    clearTimeout(loopTimeout);
    sourceNodes.forEach(n => { try { n.stop(); } catch(e) {} });
    sourceNodes = [];
    // Suspend rather than close — keeps context ready for next play
    if (audioCtx) audioCtx.suspend();
  }

  document.getElementById('music-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    if (playing) stopMusic(); else startMusic();
  });

  // ── EASTER EGG: ® ──
  const boo = document.getElementById('boo');
  let booTimer;
  document.getElementById('reg').addEventListener('click', () => {
    clearTimeout(booTimer);
    boo.classList.add('show');
    booTimer = setTimeout(() => boo.classList.remove('show'), 1800);
  });

  // ── INTRO ──
  const introEl      = document.getElementById('intro');
  const introGhostEl = document.getElementById('intro-ghost');
  const mainEl       = document.getElementById('main');

  function launchExperience() {
    // Trigger zoom
    introGhostEl.classList.add('zoom');
    // After zoom fills screen fade intro, show main, start music
    setTimeout(() => {
      introEl.classList.add('fade-out');
      mainEl.classList.add('visible');
      startMusic();
    }, 600);
    // Remove intro from DOM
    setTimeout(() => {
      introEl.style.display = 'none';
    }, 1500);
  }

  introEl.addEventListener('click', launchExperience);

  // ── GHOST COUNTER ──
  // countEl looked up lazily so it's always safe to call updateCount
  // regardless of script execution order
  function updateCount(n) {
    ghostTotal += n;
    const el = document.getElementById('count-num');
    if (el) el.textContent = ghostTotal.toLocaleString();
  }

  // ── EASTER EGG: ★ — chaos mode toggle ──
  const star = document.querySelector('header h1 em');

  function randomiseGhosts() {
    const ghosts = document.querySelectorAll('.ghost-img');
    const sp = speedMult;
    ghosts.forEach(img => {
      const animType = animTypes[Math.floor(Math.random() * animTypes.length)];
      const colour   = colours[Math.floor(Math.random() * colours.length)];
      const dur      = { bounce:0.48, stretch:1.2, turn:1.6, shrink:0.9, wave:1.0,
                         wobble:0.8, float:1.4, squash:1.1, shake:0.5, nod:0.9,
                         heartbeat:0.8, melt:1.4 }[animType];
      const sdur     = dur / sp;
      const soff     = -(Math.random() * sdur); // random phase offset
      img.style.filter = colour;
      switch(animType) {
        case 'bounce':    img.style.animation = `b1 ${sdur}s ease-in-out ${soff}s infinite alternate`; break;
        case 'stretch':   img.style.animation = `stretch ${sdur}s ease-in-out ${soff}s infinite`; break;
        case 'turn':      img.style.animation = `turn ${sdur}s ease-in-out ${soff}s infinite`; break;
        case 'shrink':    img.style.animation = `shrink ${sdur}s ease-in-out ${soff}s infinite`; break;
        case 'wave':      img.style.animation = `wave ${sdur}s ease-in-out ${soff}s infinite`; break;
        case 'wobble':    img.style.animation = `wobble ${sdur}s ease-in-out ${soff}s infinite`; break;
        case 'float':     img.style.animation = `float ${sdur}s ease-in-out ${soff}s infinite alternate`; break;
        case 'squash':    img.style.animation = `squash ${sdur}s ease-in-out ${soff}s infinite`; break;
        case 'shake':     img.style.animation = `shake ${sdur}s ease-in-out ${soff}s infinite`; break;
        case 'nod':       img.style.animation = `nod ${sdur}s ease-in-out ${soff}s infinite`; break;
        case 'heartbeat': img.style.animation = `heartbeat ${sdur}s ease-in-out ${soff}s infinite`; break;
        case 'melt':      img.style.animation = `melt ${sdur}s ease-in-out ${soff}s infinite`; break;
      }
    });
  }

  function restoreRows() {
    while (stage.firstChild) stage.removeChild(stage.firstChild);
    rowIdx = 0;
    for (let r = 0; r < 30; r++) addGhostBlock();
    if (speedMult !== 1.0) applySpeed(speedMult);
  }

  star.addEventListener('click', (e) => {
    e.stopPropagation();
    chaosMode = !chaosMode;
    if (chaosMode) {
      star.style.animation = 'star-glow 0.4s ease-in-out infinite alternate';
      randomiseGhosts();
    } else {
      star.style.animation = 'star-glow 2.5s ease-in-out infinite alternate';
      restoreRows();
    }
  });

  // ── SPEED CONTROL ──
  // Store base durations on each ghost as data attributes
  // Speed always applied from base, never compounded
  function applySpeed(mult) {
    speedMult = mult;
    document.querySelectorAll('.ghost-img').forEach(img => {
      // Store original durations on first apply
      if (!img.dataset.baseDurations) {
        img.dataset.baseDurations = img.style.animationDuration;
      }
      const bases = img.dataset.baseDur.split(',');
      img.style.animationDuration = bases.map(d => {
        const val = parseFloat(d);
        return isNaN(val) ? d : (val / mult) + 's';
      }).join(',');
    });
    // Restart music at new speed
    if (playing) { stopMusic(); startMusic(); }
  }

  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applySpeed(parseFloat(btn.dataset.speed));
    });
  });
